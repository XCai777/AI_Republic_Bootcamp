name: Streamly Python Workflow

on:
  push:
    branches:
      - main
env:
  GIT_TOKEN: ${{ secrets.STREAM_LIT_TOKEN }}
  
jobs:
  run_python_script:
    runs-on: ubuntu-latest
    environment: STREAMLIT_TOKEN

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |

    - name: Run Python script
      env:
        STREAM_LIT_TOKEN: ${{ secrets.STREAM_LIT_TOKEN }}  # Referencing the secret
      run: |
        python -c 'import os; git_token=os.environ["GIT_TOKEN"]; print(git_token)'
